<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>AWord</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; user-select: none; cursor: default;
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  body {
    /* Nền sáng, dịu mắt — tương phản có chủ đích với giao diện tối của app */
    background: radial-gradient(circle at 50% 30%, #ffffff 0%, #f4f6fb 55%, #e9edf6 100%);
    color: #2a2f3a;
  }
  .wrap {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  .logo {
    width: 84px; height: 84px; border-radius: 20px;
    background: linear-gradient(135deg, #ff9a5a, #e0662a);
    display: flex; align-items: center; justify-content: center;
    font-size: 50px; font-weight: 700; color: #fff;
    box-shadow: 0 10px 30px rgba(224, 102, 42, .35), 0 2px 6px rgba(224, 102, 42, .25);
  }
  .ten {
    font-size: 30px; font-weight: 600; letter-spacing: .5px; color: #1f2430;
  }
  .phu { font-size: 13px; color: #6b7280; margin-top: -6px; }
  .vong {
    margin-top: 10px; width: 28px; height: 28px;
    border: 3px solid #dfe4ee; border-top-color: #e0662a;
    border-radius: 50%; animation: quay 0.9s linear infinite;
  }
  @keyframes quay { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">A</div>
    <div class="ten">AWord</div>
    <div class="phu">Giải pháp AI &amp; Chuyển đổi số — đang khởi động…</div>
    <div class="vong"></div>
  </div>
</body>
</html>
