<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AWord</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Thanh tiêu đề tùy biến: logo AWord + menu (giống bản hiện tại) -->
  <div id="titlebar" data-tauri-drag-region>
    <div class="logo">A</div>
    <div class="appname">AWord</div>
    <nav class="menubar">
      <span class="menu">Tệp</span>
      <span class="menu">Chỉnh sửa</span>
      <span class="menu">Xem</span>
      <span class="menu">Trợ giúp</span>
    </nav>
    <div class="titletext">AWord — Giải pháp AI &amp; Chuyển đổi số</div>
    <div class="winctrls"><span>&#x2013;</span><span>&#x25A1;</span><span class="close">&#x2715;</span></div>
  </div>

  <div id="body">
    <!-- Thanh hoạt động (activity bar) trái -->
    <div id="activitybar">
      <div class="act active" title="Khám phá">&#x1F4C1;</div>
      <div class="act" title="Trò chuyện">&#x1F916;</div>
    </div>

    <!-- Explorer -->
    <aside id="explorer">
      <div class="side-title">KHÁM PHÁ</div>
      <div id="ws-name"></div>
      <ul id="filetree"></ul>
    </aside>

    <!-- Vùng chính: khung chat Claude -->
    <main id="main">
      <div id="chattoolbar">
        <span class="tab active">🤖 Claude</span>
        <span class="spacer"></span>
        <button id="btn-new" title="Cuộc trò chuyện mới">＋ Mới</button>
        <button id="btn-stop" title="Dừng lượt hiện tại">■ Dừng</button>
      </div>
      <div id="chat"></div>

      <!-- Trình xem tài liệu (text) — phủ lên khung chat khi mở tệp -->
      <div id="viewer" class="hidden">
        <div class="viewer-bar"><span id="viewer-title"></span><button id="viewer-close" title="Đóng">✕</button></div>
        <pre id="viewer-body"></pre>
      </div>

      <div id="composer">
        <textarea id="input" rows="1" placeholder="Nhập yêu cầu bằng tiếng Việt rồi nhấn Enter…"></textarea>
        <button id="send" title="Gửi (Enter)">&#x27A4;</button>
      </div>
      <div id="status">Đang kết nối…</div>
    </main>
  </div>
  <!-- Lớp phủ khi lần đầu tự cài / cập nhật Claude -->
  <div id="bootoverlay" class="hidden">
    <div class="boot-inner">
      <div class="big-logo">A</div>
      <div id="boot-msg">Đang chuẩn bị AWord…</div>
      <div class="boot-spin"></div>
      <div id="boot-sub"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
